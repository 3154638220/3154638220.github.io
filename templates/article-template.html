<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{META_DESCRIPTION}}">
  <title>{{TITLE}} - qnxy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../vendor/katex.min.css">
  <link rel="stylesheet" href="../vendor/highlight.min.css">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <div class="grid-bg" aria-hidden="true"></div>
  <div class="scan-line" aria-hidden="true"></div>
  <nav class="navbar">
    <div class="nav-brand"><a href="../index.html"><span class="bracket">[</span>DEV<span class="bracket">]</span></a></div>
    <ul class="nav-links">
      <li><a href="../index.html" data-i18n="nav.home">Home</a></li>
      <li><a href="../about.html" data-i18n="nav.about">About</a></li>
      <li><a href="../projects.html" data-i18n="nav.projects">Projects</a></li>
      <li><a href="../blog.html" data-i18n="nav.blog">Blog</a></li>
      <li><a href="../game.html" data-i18n="nav.games">Games</a></li>
      <li><a href="../contact.html" data-i18n="nav.contact">Contact</a></li>
      <li><button class="lang-toggle" type="button" aria-label="Language">中文</button></li>
      <li><button class="theme-toggle" aria-label="Toggle theme" type="button" data-i18n-aria="aria.theme"></button></li>
    </ul>
    <button class="nav-toggle" aria-label="Menu" data-i18n-aria="aria.menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <main>
    <article class="section article-page">
      <header class="article-header">
        <h1 class="article-title">{{TITLE}}</h1>
        <time class="article-date" datetime="{{DATE}}">{{DATE}}</time>
        <span class="article-reading-time">~{{READING_TIME}} min read</span>
      </header>
      <div class="article-body">
        {{BODY}}
      </div>
      <footer class="article-footer">
        <nav class="article-nav" aria-label="文章导航">
          {{PREV_LINK}}
          {{NEXT_LINK}}
        </nav>
        <a href="../blog.html" class="btn btn-outline article-back-list" data-i18n="btn.backToBlog">← Back to Blog</a>
      </footer>
    </article>
  </main>

  <footer class="footer">
    <p><span class="footer-code">//</span> © 2025 · by qnxy <span style="color:red;">❤</span> · <span id="busuanzi_site_uv"></span> <span data-i18n="footer.visitors">visitors</span> · <span id="busuanzi_site_pv"></span> <span data-i18n="footer.pageViews">page views</span></p>
  </footer>

  <script async src="https://cdn.busuanzi.cc/busuanzi/3.6.9/busuanzi.min.js"></script>
  <script src="../i18n.js"></script>
  <script src="../script.js"></script>
</body>
</html>
